<!DOCTYPE html>
<html lang="en">
<head>

  <title>Page Not Found — Seton Educational Services</title>
  <meta name="robots" content="noindex">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #1a2744;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .container { max-width: 600px; }
    h1 {
      font-size: 5rem;
      color: #c9a84c;
      margin-bottom: 10px;
      line-height: 1;
    }
    h2 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: #fff;
    }
    p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.7;
      margin-bottom: 30px;
    }
    a.btn {
      display: inline-block;
      padding: 14px 35px;
      background: #c9a84c;
      color: #1a2744;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 4px;
      margin: 0 8px 10px;
      transition: all 0.3s ease;
    }
    a.btn:hover {
      background: #e8d9a0;
      transform: translateY(-2px);
    }
    a.btn-outline {
      background: transparent;
      border: 2px solid #c9a84c;
      color: #c9a84c;
    }
    a.btn-outline:hover {
      background: #c9a84c;
      color: #1a2744;
    }
